<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unity Asset Viewer — Live Testbench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-darker: #121214;
      --bg-dark: #18181c;
      --bg-card: #202024;
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f3f3f5;
      --text-muted: #8e8e93;
      --accent-color: #38bdf8; /* Cyan sky blue */
      --accent-glow: rgba(56, 189, 248, 0.15);
      --success-color: #4ade80;
      --success-glow: rgba(74, 222, 128, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-darker);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top Premium Banner */
    header {
      height: 64px;
      background-color: var(--bg-dark);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 10;
    }

    .brand-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-cube {
      font-size: 22px;
      animation: rotateCube 6s ease-in-out infinite;
    }

    @keyframes rotateCube {
      0%, 100% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.1); }
    }

    .title-area h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-main);
    }

    .title-area p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .status-section {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* Filename indicator */
    .file-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
    }

    .file-icon {
      color: var(--accent-color);
    }

    .file-name {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      color: var(--text-main);
    }

    /* Status Badge styling */
    .status-badge {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 6px 12px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-badge::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .status-badge.preview-mode {
      background-color: var(--success-glow);
      color: var(--success-color);
      border: 1px solid rgba(74, 222, 128, 0.3);
    }

    .status-badge.preview-mode::before {
      background-color: var(--success-color);
      box-shadow: 0 0 8px var(--success-color);
      animation: pulse 1.5s infinite alternate;
    }

    .status-badge.default-mode {
      background-color: var(--accent-glow);
      color: var(--accent-color);
      border: 1px solid rgba(56, 189, 248, 0.3);
    }

    .status-badge.default-mode::before {
      background-color: var(--accent-color);
      box-shadow: 0 0 8px var(--accent-color);
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.6; }
      100% { transform: scale(1.2); opacity: 1; }
    }

    /* App Workspace */
    main {
      flex: 1;
      height: calc(100vh - 64px);
      position: relative;
      background-color: var(--bg-darker);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* Loading Fallback */
    .loading-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background-color: var(--bg-darker);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 14px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <header>
    <div class="brand-section">
      <div class="logo-cube">🧊</div>
      <div class="title-area">
        <h1>Unity Asset Viewer</h1>
        <p>Core Renderer - Live Testbench</p>
      </div>
    </div>
    <div class="status-section">
      <div class="file-indicator">
        <span class="file-icon">📄</span>
        <span id="preview-details" class="file-name">Loading...</span>
      </div>
      <div id="preview-status" class="status-badge default-mode">Initializing</div>
    </div>
  </header>
  
  <main>
    <div id="app">
      <div class="loading-container">
        <div class="spinner"></div>
        <div class="loading-text">Parsing and rendering Unity prefab...</div>
      </div>
    </div>
  </main>

  <script type="module" src="/src/dev/DevServerBootstrap.ts"></script>
</body>
</html>
