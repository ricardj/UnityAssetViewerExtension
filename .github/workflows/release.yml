name: Build and Release Extensions

on:
  push:
    tags:
      - 'v*' # Triggers the workflow on any tag pushing that starts with 'v' (e.g. v1.0.0)

permissions:
  contents: write # Crucial: gives the Action permission to create releases and upload files

jobs:
  release:
    name: Build & Publish Release Assets
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install npm monorepo dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build all packages in the workspaces
      - name: Build all packages
        run: npm run build

      # 5. Extract extension and package versions from package.json files
      - name: Extract Versions
        id: get_versions
        run: |
          CHROME_VER=$(node -p "require('./packages/chrome-extension/package.json').version")
          VSCODE_VER=$(node -p "require('./packages/vscode-extension/package.json').version")
          PARSER_VER=$(node -p "require('./packages/core-parser/package.json').version")
          RENDERER_VER=$(node -p "require('./packages/core-renderer/package.json').version")
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          echo "CHROME_VER=$CHROME_VER" >> $GITHUB_OUTPUT
          echo "VSCODE_VER=$VSCODE_VER" >> $GITHUB_OUTPUT
          echo "PARSER_VER=$PARSER_VER" >> $GITHUB_OUTPUT
          echo "RENDERER_VER=$RENDERER_VER" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          
          echo "Chrome Extension Version: $CHROME_VER"
          echo "VS Code Extension Version: $VSCODE_VER"
          echo "Core Parser Version: $PARSER_VER"
          echo "Core Renderer Version: $RENDERER_VER"
          echo "Tag Name: $TAG_NAME"

      # 6. Package the Chrome Extension as a ZIP archive
      - name: Package Chrome Extension
        run: |
          cd packages/chrome-extension
          zip -r ../../chrome-extension-v${{ steps.get_versions.outputs.CHROME_VER }}.zip dist/
          cd ../..

      # 7. Package the VS Code Extension as a VSIX file using vsce
      - name: Package VS Code Extension
        run: |
          cd packages/vscode-extension
          # We use npx to run vsce without requiring it to be in devDependencies
          npx @vscode/vsce package --no-dependencies --allow-missing-repository --out ../../unity-asset-viewer-v${{ steps.get_versions.outputs.VSCODE_VER }}.vsix
          cd ../..

      # 8. Package the Core Parser library as an npm tarball
      - name: Package Core Parser
        run: |
          cd packages/core-parser
          npm pack --pack-destination ../../
          cd ../..

      # 9. Package the Core Renderer library as an npm tarball
      - name: Package Core Renderer
        run: |
          cd packages/core-renderer
          npm pack --pack-destination ../../
          cd ../..

      # 10. Upload Build Artifacts to the Actions Run Summary
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            chrome-extension-v${{ steps.get_versions.outputs.CHROME_VER }}.zip
            unity-asset-viewer-v${{ steps.get_versions.outputs.VSCODE_VER }}.vsix
            unity-asset-viewer-core-parser-${{ steps.get_versions.outputs.PARSER_VER }}.tgz
            unity-asset-viewer-core-renderer-${{ steps.get_versions.outputs.RENDERER_VER }}.tgz

      # 11. Create a GitHub Release and upload all packaged artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_versions.outputs.TAG_NAME }}
          name: Release ${{ steps.get_versions.outputs.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            chrome-extension-v${{ steps.get_versions.outputs.CHROME_VER }}.zip
            unity-asset-viewer-v${{ steps.get_versions.outputs.VSCODE_VER }}.vsix
            unity-asset-viewer-core-parser-${{ steps.get_versions.outputs.PARSER_VER }}.tgz
            unity-asset-viewer-core-renderer-${{ steps.get_versions.outputs.RENDERER_VER }}.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
